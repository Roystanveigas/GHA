name: Build-Push-Deploy
on:
  push:
    branch: ["master"]

jobs:
  build_push_deploy:
   runs-on: ubuntu-latest


   steps:
     - name:  checkout code
       uses: actions/checkout@v3
     - name: Sertup java
       uses: actions/setup-java@v3
       with:
         distribution: "temurin"
         java-version: "17"
     - name: Build with maven
       run: mvn -B package
     - name: Login to dockerhub
       uses: docker/login-action@v3
       with:
         username: ${{secrets.DOCKERHUB_USERNAME}}
         password: ${{secrets.DOCKERHUB_TOKEN}}
     - name: build docker image
       run: docker build -t ${{secrets.DOCKER_USERNAME}}/java-docker-app:latest .
     - name: push image to dockerhub
       run: docker push ${{secrets.DOCKER_USERNAME}}/java-docker-app:latest
     - name: deploy to ec2
       uses: appleboy/ssh-action@v1.1.0
       with:
        host: ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USER}}
        key: ${{secrets.EC2_KEY}}
        script: |
          #stop and remove existing container
          docker rm -f javaapp || true
          #pull latest image
          docker pull ${{secrets.DOKERHUB_USERNAME}}/java-docker-app:latest
          #run 
          docker run -d -p 8080:8080 --name javaapp ${{secrets.DOKERHUB_USERNAME}}/java-docker-app:latest
          #show running containers
          docker ps
